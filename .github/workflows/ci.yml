name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DOTHELLO_BUILD_EXPERIMENT_TOOLS=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  python-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Test Python scripts
        run: python3 -m unittest discover tools/scripts/tests

  clang-tidy:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install clang-tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy

      - name: Configure
        run: cmake -S . -B build-tidy -DCMAKE_BUILD_TYPE=Debug -DOTHELLO_ENABLE_CLANG_TIDY=ON -DOTHELLO_BUILD_TOOLS=OFF -DOTHELLO_BUILD_TESTS=OFF -DOTHELLO_BUILD_EXPERIMENT_TOOLS=OFF

      - name: Build
        run: cmake --build build-tidy --target othello --parallel

  clang-tidy-full:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install clang-tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy

      - name: Configure
        run: cmake -S . -B build-tidy-full -DCMAKE_BUILD_TYPE=Debug -DOTHELLO_ENABLE_CLANG_TIDY=ON

      - name: Build
        run: cmake --build build-tidy-full --parallel

  sanitizers:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure
        run: cmake -S . -B build-sanitizers -DCMAKE_BUILD_TYPE=Debug -DOTHELLO_ENABLE_SANITIZERS=ON -DOTHELLO_BUILD_EXPERIMENT_TOOLS=OFF

      - name: Build
        run: cmake --build build-sanitizers --parallel

      - name: Test
        run: ctest --test-dir build-sanitizers --output-on-failure

  experiment-tools:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure
        run: cmake -S . -B build-experiment-tools -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build-experiment-tools --parallel

      - name: Test experiment tools
        run: ctest --test-dir build-experiment-tools --output-on-failure -L experiment
